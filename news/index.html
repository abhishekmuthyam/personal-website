<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Discover</title>
  <meta name="description" content="Real-time technical news discovery for Java, cloud, AI, developer tools, and software engineering.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <script src="/auth.js" defer></script>
  <link rel="canonical" href="https://abhishekmuthyam.com/news/">
  <meta property="og:title" content="Tech Discover">
  <meta property="og:description" content="Real-time technical news discovery for Java, cloud, AI, developer tools, and software engineering.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://abhishekmuthyam.com/news/">
  <meta property="og:image" content="https://abhishekmuthyam.com/og-image.png">
  <meta property="og:site_name" content="abhishekmuthyam.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://abhishekmuthyam.com/og-image.png">
</head>
<body class="discover-body">
    <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="/"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true" style="flex:0 0 auto;"><path d="M12 3.1 2.6 11.5h2.9V21h5v-5.5h3V21h5v-9.5h2.9L12 3.1z"/></svg> Home</a>
      <div class="nav-links">
        <a href="/watch">Watch</a>
        <a href="/discover" class="active">News</a>
        <a href="/legends">Legends</a>
        <a href="/games">Games</a>
        <a href="/calci">Tools</a>
        <a href="/learn">Learn AI</a>
        <a href="/nutrition">Nutrition</a>
      </div>
    </nav>
  </header>
  <div class="discover-shell">

    <main class="discover-main">
      <header class="discover-header">
        <div>
          <p class="eyebrow">Live Tech Feed</p>
          <h1>Tech News</h1>
        </div>
        <div class="discover-tabs" aria-label="News views">
          <button class="discover-tab active" type="button" data-filter="all">Top</button>
          <button class="discover-tab" type="button" data-filter="java">Java</button>
          <button class="discover-tab" type="button" data-filter="cloud">Cloud</button>
          <button class="discover-tab" type="button" data-filter="ai">AI</button>
          <button class="discover-tab" type="button" data-filter="devtools">Dev Tools</button>
        </div>
      </header>

      <div id="inlineArticle" hidden></div>

      <section id="leadStory" class="discover-lead" aria-label="Top story">
        <p>Loading latest technical news...</p>
      </section>

      <section id="spotlightGrid" class="spotlight-grid" aria-label="Spotlight stories"></section>

      <section>
        <div class="feed-heading">
          <h2>Latest</h2>
          <p id="newsUpdated">Updated about every 10 minutes by GitHub Actions.</p>
        </div>
        <div id="storyList" class="story-list" aria-label="Latest technical news"></div>
      </section>
    </main>

    <aside class="discover-side" aria-label="Personalization">
      <section class="personalize-card">
        <div class="side-card-title">
          <h2>Make it yours</h2>
          <button id="clearTopics" type="button" aria-label="Clear selected topics">Clear</button>
        </div>
        <p>Select topics and interests to customize your Discover experience.</p>
        <div class="interest-grid">
          <button type="button" data-interest="java">Java</button>
          <button type="button" data-interest="cloud">Cloud</button>
          <button type="button" data-interest="ai">AI</button>
          <button type="button" data-interest="devtools">Dev Tools</button>
        </div>
        <button id="saveTopics" class="save-interests" type="button">Save Interests</button>
      </section>

      <section class="personalize-card compact">
        <h2>Sources</h2>
        <ul id="sourceList" class="source-list">
          <li>Loading sources...</li>
        </ul>
      </section>
    </aside>
  </div>

  <script>
    const topicLabels = {
      all: "Top",
      java: "Java",
      cloud: "Cloud",
      ai: "AI",
      devtools: "Dev Tools"
    };

    const tabButtons = document.querySelectorAll(".discover-tab");
    const interestButtons = document.querySelectorAll("[data-interest]");
    const leadElement = document.getElementById("leadStory");
    const spotlightElement = document.getElementById("spotlightGrid");
    const storyListElement = document.getElementById("storyList");
    const updatedElement = document.getElementById("newsUpdated");
    const sourceListElement = document.getElementById("sourceList");
    const clearTopicsButton = document.getElementById("clearTopics");
    const saveTopicsButton = document.getElementById("saveTopics");

    let allItems = [];
    const catParam = new URLSearchParams(location.search).get("cat");
    let activeFilter = catParam || localStorage.getItem("discoverTopic") || "all";
    if (catParam) localStorage.setItem("discoverTopic", catParam);
    let selectedInterests = new Set(JSON.parse(localStorage.getItem("discoverInterests") || "[]"));

    async function loadNews() {
      try {
        const response = await fetch("./news-data.json?v=" + Date.now());
        if (!response.ok) {
          throw new Error("News data unavailable");
        }

        const data = await response.json();
        allItems = Array.isArray(data.items) ? data.items : [];
        renderSources(data.sources || []);
        renderUpdated(data.updatedAt);
        syncControls();
        renderDiscover();
      } catch (error) {
        leadElement.innerHTML = "<p>Live news could not load right now. Please refresh after the next scheduled update.</p>";
        spotlightElement.innerHTML = "";
        storyListElement.innerHTML = "";
      }
    }

    function renderDiscover() {
      const visibleItems = getVisibleItems();
      const lead = visibleItems[0];
      const spotlight = visibleItems.slice(1, 4);
      const list = visibleItems.slice(4);

      if (!lead) {
        leadElement.innerHTML = `<p>No updates found for ${escapeHtml(topicLabels[activeFilter] || "this topic")}.</p>`;
        spotlightElement.innerHTML = "";
        storyListElement.innerHTML = "";
        return;
      }

      leadElement.innerHTML = `
        <div>
          <span class="story-topic">${escapeHtml(lead.topicLabel || lead.topic)}</span>
          <h2><a href="${getArticleUrl(lead)}">${escapeHtml(lead.title)}</a></h2>
          <p>${escapeHtml(lead.summary || "Open the source to read the full update.")}</p>
          <div class="story-meta">
            <span>${formatDate(lead.publishedAt)}</span>
            <span>${escapeHtml(lead.source)}</span>
            <span>1 source</span>
          </div>
        </div>
        <a class="lead-visual" href="${getArticleUrl(lead)}" aria-label="Open lead story">
          ${renderVisual(lead)}
        </a>
      `;

      spotlightElement.innerHTML = spotlight.map(item => `
        <article class="spotlight-card">
          <a class="spotlight-visual" href="${getArticleUrl(item)}">${renderVisual(item)}</a>
          <div>
            <span class="story-topic">${escapeHtml(item.topicLabel || item.topic)}</span>
            <h3><a href="${getArticleUrl(item)}">${escapeHtml(item.title)}</a></h3>
            <div class="story-meta">
              <span>${escapeHtml(item.source)}</span>
              <span>1 source</span>
            </div>
          </div>
        </article>
      `).join("");

      storyListElement.innerHTML = list.map(item => `
        <article class="story-row">
          <div class="story-dot">${getSourceInitials(item.source)}</div>
          <div>
            <span class="story-topic">${escapeHtml(item.topicLabel || item.topic)}</span>
            <h3><a href="${getArticleUrl(item)}">${escapeHtml(item.title)}</a></h3>
            <p>${escapeHtml(item.summary || "Open the source to read the full update.")}</p>
            <div class="story-meta">
              <span>${formatDate(item.publishedAt)}</span>
              <span>${escapeHtml(item.source)}</span>
              <span>1 source</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    function getVisibleItems() {
      if (activeFilter !== "all") {
        return allItems.filter(item => item.topic === activeFilter);
      }

      if (selectedInterests.size) {
        const preferred = allItems.filter(item => selectedInterests.has(item.topic));
        const rest = allItems.filter(item => !selectedInterests.has(item.topic));
        return [...preferred, ...rest];
      }

      return allItems;
    }

    function renderSources(sources) {
      if (!sources.length) {
        sourceListElement.innerHTML = "<li>No source data yet.</li>";
        return;
      }

      sourceListElement.innerHTML = sources
        .map(source => `<li><span>${escapeHtml(source.name)}</span><strong>${source.ok ? source.count : "Retry"}</strong></li>`)
        .join("");
    }

    function renderUpdated(updatedAt) {
      if (!updatedAt) {
        updatedElement.innerText = "Updated about every 10 minutes by GitHub Actions.";
        return;
      }

      updatedElement.innerText = "Last refreshed " + new Date(updatedAt).toLocaleString();
    }

    function syncControls() {
      tabButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.filter === activeFilter);
      });

      interestButtons.forEach(button => {
        button.classList.toggle("selected", selectedInterests.has(button.dataset.interest));
      });
    }

    function formatDate(value) {
      if (!value) {
        return "Recent";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "Recent";
      }

      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function getSourceInitials(source) {
      return String(source || "Tech")
        .split(/\s+/)
        .slice(0, 2)
        .map(part => part.charAt(0).toUpperCase())
        .join("");
    }

    function getArticleUrl(item) {
      return "./article/?id=" + encodeURIComponent(item.id || "");
    }

    function renderVisual(item) {
      if (item.image && item.image.startsWith("http")) {
        return `<img src="${escapeAttribute(item.image)}" alt="">`;
      }

      return `<span>${getSourceInitials(item.source)}</span>`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttribute(value) {
      const text = String(value || "#");
      if (!text.startsWith("http://") && !text.startsWith("https://")) {
        return "#";
      }

      return escapeHtml(text);
    }

    tabButtons.forEach(button => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        localStorage.setItem("discoverTopic", activeFilter);
        syncControls();
        renderDiscover();
      });
    });

    interestButtons.forEach(button => {
      button.addEventListener("click", () => {
        const interest = button.dataset.interest;
        if (selectedInterests.has(interest)) {
          selectedInterests.delete(interest);
        } else {
          selectedInterests.add(interest);
        }
        syncControls();
      });
    });

    saveTopicsButton.addEventListener("click", () => {
      localStorage.setItem("discoverInterests", JSON.stringify([...selectedInterests]));
      activeFilter = "all";
      localStorage.setItem("discoverTopic", activeFilter);
      syncControls();
      renderDiscover();
    });

    clearTopicsButton.addEventListener("click", () => {
      selectedInterests = new Set();
      localStorage.removeItem("discoverInterests");
      activeFilter = "all";
      localStorage.setItem("discoverTopic", activeFilter);
      syncControls();
      renderDiscover();
    });

    loadNews();
  </script>
<script>
/* Inline article reader: clicking a story renders it below the sticky
   header/tabs instead of navigating away. Tabs always restore the list. */
(function () {
  const container = document.getElementById("inlineArticle");
  const feedParts = [".discover-lead", ".spotlight-grid", ".feed-heading", ".story-list"]
    .map(sel => document.querySelector(sel)).filter(Boolean);

  function escText(value) {
    return String(value || "").replace(/[&<>"']/g, ch => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
  }

  function safeUrl(value) {
    const text = String(value || "");
    return (text.startsWith("http://") || text.startsWith("https://")) ? escText(text) : "";
  }

  function findItem(id) {
    return (typeof allItems !== "undefined" ? allItems : []).find(item => item.id === id);
  }

  function articleHtml(item) {
    const visual = item.image && safeUrl(item.image)
      ? '<img class="article-image" src="' + safeUrl(item.image) + '" alt="">'
      : '<div class="article-image placeholder">📰</div>';
    const sources = Array.isArray(item.sources) ? item.sources.filter(s => s && s.link) : [];
    const sourceLinks = sources.slice(0, 6).map(s =>
      '<a class="source-pill" href="' + safeUrl(s.link) + '" target="_blank" rel="noopener">' +
        '<strong>' + escText(s.name || "Source") + '</strong>' +
        '<span>' + escText((s.summary || "").slice(0, 140)) + '</span></a>').join("");
    const published = item.publishedAt ? new Date(item.publishedAt).toLocaleString() : "";
    return (
      '<div class="article-content">' +
        '<span class="story-topic">' + escText(item.categoryLabel || item.topicLabel || "News") + '</span>' +
        '<h1>' + escText(item.title) + '</h1>' +
        '<p class="article-summary">' + escText(item.summary || "") + '</p>' +
        '<p class="article-meta">' + escText(item.source || "") + (published ? " · " + published : "") + '</p>' +
        visual +
        (item.link && safeUrl(item.link)
          ? '<p><a class="button primary" href="' + safeUrl(item.link) + '" target="_blank" rel="noopener">Read at ' + escText(item.source || "source") + ' ↗</a></p>'
          : "") +
        (sourceLinks
          ? '<section class="article-section"><h2>Coverage</h2><div class="article-sources">' + sourceLinks + '</div></section>'
          : "") +
      '</div>');
  }

  function showArticle(id, push) {
    const item = findItem(id);
    if (!item) { return false; }
    container.innerHTML = '<button class="article-back">&larr; Back</button>' + articleHtml(item);
    container.querySelector(".article-back").onclick = () => {
      const url = new URL(location.href);
      url.searchParams.delete("article");
      history.pushState({}, "", url);
      showList(false);
    };
    container.hidden = false;
    feedParts.forEach(el => { el.hidden = true; });
    if (push) {
      const url = new URL(location.href);
      url.searchParams.set("article", id);
      history.pushState({ article: id }, "", url);
    }
    window.scrollTo({ top: 0 });
    return true;
  }

  function showList(push) {
    container.hidden = true;
    container.innerHTML = "";
    feedParts.forEach(el => { el.hidden = false; });
    if (push) {
      const url = new URL(location.href);
      url.searchParams.delete("article");
      history.pushState({}, "", url);
    }
  }

  document.addEventListener("click", event => {
    const link = event.target.closest('a[href*="article/?id="]');
    if (!link) { return; }
    const id = new URL(link.href, location.href).searchParams.get("id");
    if (id && findItem(id)) {
      event.preventDefault();
      showArticle(id, true);
    }
  });

  document.querySelectorAll(".discover-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      const url = new URL(location.href);
      url.searchParams.delete("article");
      history.replaceState({}, "", url);
      showList(false);
    });
  });

  window.addEventListener("popstate", () => {
    const id = new URLSearchParams(location.search).get("article");
    if (id) { showArticle(id, false); } else { showList(false); }
  });

  const deepLinkId = new URLSearchParams(location.search).get("article");
  if (deepLinkId) {
    let tries = 0;
    const timer = setInterval(() => {
      tries += 1;
      if (showArticle(deepLinkId, false) || tries > 40) { clearInterval(timer); }
    }, 200);
  }
})();
</script>
</body>
</html>
