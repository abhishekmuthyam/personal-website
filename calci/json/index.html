<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter</title>
  <meta name="description" content="Paste JSON to validate, pretty-print, or minify it — all in your browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
  <script src="/auth.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="/"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true" style="flex:0 0 auto;"><path d="M12 3.1 2.6 11.5h2.9V21h5v-5.5h3V21h5v-9.5h2.9L12 3.1z"/></svg> Home</a>
      <div class="nav-links">
        <a href="/watch">Watch</a>
        <a href="/discover">News</a>
        <a href="/stories">Legends</a>
        <a href="/games">Games</a>
        <a href="/calci" class="active">Tools</a>
        <a href="/learn">Learn AI</a>
      </div>
    </nav>
  </header>

  <section class="hero">
    <h1>JSON Formatter</h1>
    <p>Paste JSON to validate, pretty-print, or minify it — all in your browser.</p>
  </section>

  <section style="margin: 24px auto -22px;">
    <a class="article-back" href="/calci">&larr; All Tools</a>
  </section>

  <section>
    <div class="tool-card">

      <textarea class="tool-area" id="input" rows="9" placeholder='{"paste":"your json here"}' spellcheck="false"></textarea>
      <div class="tool-row">
        <button class="tool-btn" id="fmtBtn">Format</button>
        <button class="tool-btn" id="minBtn">Minify</button>
        <button class="tool-btn ghost" id="copyBtn">Copy result</button>
      </div>
      <p class="tool-note" id="status"></p>
      <textarea class="tool-area" id="output" rows="12" readonly spellcheck="false" placeholder="Result appears here"></textarea>

    </div>
  </section>

  <footer>
    &copy; 2026 abhishekmuthyam.com. Built for learning and experiments.
  </footer>

  <script>

    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    function run(minify) {
      try {
        const parsed = JSON.parse(input.value);
        output.value = JSON.stringify(parsed, null, minify ? 0 : 2);
        status.innerText = "✅ Valid JSON";
        status.style.color = "#2dd4bf";
      } catch (err) {
        output.value = "";
        status.innerText = "❌ " + err.message;
        status.style.color = "#fda4af";
      }
    }
    document.getElementById("fmtBtn").onclick = () => run(false);
    document.getElementById("minBtn").onclick = () => run(true);
    document.getElementById("copyBtn").onclick = async () => {
      await navigator.clipboard.writeText(output.value);
      status.innerText = "📋 Copied to clipboard";
      status.style.color = "";
    };

  </script>
</body>
</html>
