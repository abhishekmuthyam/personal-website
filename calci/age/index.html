<!DOCTYPE html>
<html>
<head>
  <title>Age Calculator</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <section class="hero">
    <h1>Age Calculator</h1>
    <p>Calculate your age from date of birth.</p>
  </section>

  <section>
    <label>Enter Date of Birth:</label><br><br>
    <input type="date" id="dob">
    <button onclick="calculateAge()">Calculate</button>

    <h2 id="result"></h2>

    <p><a href="/calci">← Back to Calculators</a></p>
  </section>

  <footer>
    © 2026 abhishekmuthyam.com
  </footer>

  <script>
    function calculateAge() {
      const dob = new Date(document.getElementById("dob").value);
      const today = new Date();

      if (!document.getElementById("dob").value) {
        document.getElementById("result").innerText = "Please select your date of birth.";
        return;
      }

      let age = today.getFullYear() - dob.getFullYear();
      const monthDiff = today.getMonth() - dob.getMonth();

      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
        age--;
      }

      document.getElementById("result").innerText = "Your age is " + age + " years.";
    }
  </script>
</body>
</html>
