<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch</title>
  <meta name="description" content="Watch curated coding, science, learning, and tech videos — right here, no channel hopping.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <script src="/auth.js" defer></script>
  <style>
    .back-bar {
      max-width: 1100px;
      margin: 18px auto 0;
      padding: 0 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      box-shadow: none;
      font-family: inherit;
    }

    .back-btn:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
      transform: none;
      box-shadow: none;
    }

    .watch-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .watch-search {
      flex: 1 1 240px;
      min-width: 200px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      outline: none;
    }

    .watch-search:focus {
      border-color: var(--brand);
    }

    .watch-search::placeholder {
      color: var(--muted);
    }

    .no-results {
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
      grid-column: 1 / -1;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      padding: 0;
      color: var(--text);
      font-family: inherit;
    }

    .video-card:hover {
      border-color: rgba(99, 102, 241, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15);
      background: var(--glass);
    }

    .video-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #1f2a44;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-thumb::after {
      content: '▶';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: white;
      background: rgba(0, 0, 0, 0.25);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .video-card:hover .video-thumb::after {
      opacity: 1;
    }

    .video-info {
      padding: 14px 16px 16px;
    }

    .video-info h3 {
      font-size: 15px;
      line-height: 1.35;
      margin: 6px 0 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .player-overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 6, 15, 0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .player-box {
      width: min(960px, 100%);
    }

    .player-box .frame-wrap {
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      background: #000;
    }

    .player-box iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .player-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .player-bar strong {
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
    }

    .player-close {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: none;
    }

    .updated-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 26px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="/"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true" style="flex:0 0 auto;"><path d="M12 3.1 2.6 11.5h2.9V21h5v-5.5h3V21h5v-9.5h2.9L12 3.1z"/></svg> Home</a>
      <div class="nav-links">
        <a href="/watch" class="active">Watch</a>
        <a href="/discover">News</a>
        <a href="/legends">Legends</a>
        <a href="/games">Games</a>
        <a href="/calci">Tools</a>
        <a href="/learn">Learn AI</a>
        <a href="/nutrition">Nutrition</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero news-hero">
      <p class="eyebrow">Watch</p>
      <h1>Videos worth your time.</h1>
      <p>Fresh uploads from trusted coding, science, learning, and tech channels — watch them right here without leaving the site.</p>
    </section>

    <section>
      <div class="watch-toolbar">
        <input type="search" class="watch-search" id="searchBox" placeholder="🔍 Search all of YouTube — press Enter" aria-label="Search all of YouTube">
        <span id="topicBar" style="display:contents">
          <button class="filter-button active" data-topic="all">Picks</button>
          <button class="filter-button" data-topic="trending">🔥 Trending</button>
          <button class="filter-button" data-topic="ai">🤖 AI</button>
          <button class="filter-button" data-topic="coding">Coding</button>
          <button class="filter-button" data-topic="science">Science</button>
          <button class="filter-button" data-topic="learn">Learn</button>
          <button class="filter-button" data-topic="tech">Tech</button>
        </span>
      </div>
      <p id="modeNote" style="color:var(--muted); font-size:13px; margin:-10px 0 18px; min-height:16px;"></p>

      <div class="video-grid" id="videoGrid"></div>
      <p class="updated-note" id="updatedNote"></p>
    </section>
  </main>

  <footer>
    &copy; 2026 abhishekmuthyam.com. Videos play via YouTube's official embedded player.
  </footer>

  <script>
    const PROXY_URL = "https://fpwwdkoxdykv6x442ndqf34iyq0nnqnq.lambda-url.ap-south-1.on.aws/";

    let allVideos = [];
    let remoteVideos = [];
    let mode = "curated";           // curated | search | trending
    let activeTopic = "all";
    let searchQuery = "";

    const grid = document.getElementById("videoGrid");
    const modeNote = document.getElementById("modeNote");
    const searchBox = document.getElementById("searchBox");

    searchBox.addEventListener("input", e => {
      searchQuery = e.target.value.trim().toLowerCase();
      if (mode !== "curated" && searchQuery === "") {
        mode = "curated";
        setActiveTab("all");
        modeNote.innerText = "";
      }
      if (mode === "curated") {
        render();
      }
    });

    searchBox.addEventListener("keydown", async e => {
      if (e.key !== "Enter") { return; }
      const q = searchBox.value.trim();
      if (q.length < 2) { return; }
      modeNote.innerText = "Searching YouTube…";
      grid.innerHTML = "";
      try {
        const res = await fetch(PROXY_URL + "?q=" + encodeURIComponent(q));
        const data = await res.json();
        if (data.error) { throw new Error(data.error); }
        remoteVideos = data.videos;
        mode = "search";
        setActiveTab(null);
        modeNote.innerText = 'YouTube results for "' + q + '" — clear the box to return to picks';
        render();
      } catch {
        modeNote.innerText = "YouTube search unavailable right now — showing site picks.";
        mode = "curated";
        render();
      }
    });

    async function loadTrending() {
      modeNote.innerText = "Loading trending…";
      grid.innerHTML = "";
      try {
        const res = await fetch(PROXY_URL + "?trending");
        const data = await res.json();
        if (data.error) { throw new Error(data.error); }
        remoteVideos = data.videos;
        mode = "trending";
        modeNote.innerText = "Trending on YouTube in India right now";
        render();
      } catch {
        modeNote.innerText = "Trending unavailable right now — showing site picks.";
        mode = "curated";
        render();
      }
    }

    function setActiveTab(topic) {
      document.querySelectorAll("#topicBar .filter-button").forEach(b =>
        b.classList.toggle("active", b.dataset.topic === topic));
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const days = Math.floor(diff / 86400000);
      if (days === 0) { return "Today"; }
      if (days === 1) { return "Yesterday"; }
      if (days < 30) { return days + " days ago"; }
      const months = Math.floor(days / 30);
      return months + (months === 1 ? " month ago" : " months ago");
    }

    function render() {
      let videos;
      if (mode === "curated") {
        videos = allVideos.filter(v => {
          if (activeTopic !== "all" && v.topic !== activeTopic) { return false; }
          if (searchQuery && !(v.title + " " + v.channel + " " + v.topicLabel).toLowerCase().includes(searchQuery)) { return false; }
          return true;
        });
      } else {
        videos = remoteVideos;
      }
      if (videos.length === 0) {
        grid.innerHTML = '<p class="no-results">No videos found' + (searchQuery ? ' for "' + escapeHtml(searchQuery) + '"' : '') + '. Press Enter to search all of YouTube.</p>';
        return;
      }
      grid.innerHTML = videos.map(v =>
        '<button class="video-card" data-id="' + v.videoId + '" data-title="' + escapeHtml(v.title) + '">' +
          '<div class="video-thumb"><img loading="lazy" src="' + v.thumbnail + '" alt=""></div>' +
          '<div class="video-info">' +
            '<span class="card-kicker">' + escapeHtml(v.topicLabel || (mode === "trending" ? "Trending" : "YouTube")) + '</span>' +
            '<h3>' + escapeHtml(v.title) + '</h3>' +
            '<div class="video-meta"><span>' + escapeHtml(v.channel) + '</span><span>' + timeAgo(v.published) + '</span></div>' +
          '</div>' +
        '</button>'
      ).join("");
    }

    function openPlayer(videoId, title) {
      const overlay = document.createElement("div");
      overlay.className = "player-overlay";
      overlay.innerHTML =
        '<div class="player-box">' +
          '<div class="player-bar"><strong>' + escapeHtml(title) + '</strong>' +
          '<button class="player-close">✕ Close</button></div>' +
          '<div class="frame-wrap"><iframe src="https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&rel=0" ' +
          'title="' + escapeHtml(title) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>' +
        '</div>';
      document.body.appendChild(overlay);
      document.body.style.overflow = "hidden";

      function close() {
        overlay.remove();
        document.body.style.overflow = "";
        document.removeEventListener("keydown", onKey);
      }
      function onKey(e) {
        if (e.key === "Escape") { close(); }
      }
      overlay.querySelector(".player-close").onclick = close;
      overlay.addEventListener("click", e => { if (e.target === overlay) { close(); } });
      document.addEventListener("keydown", onKey);
    }

    grid.addEventListener("click", e => {
      const card = e.target.closest(".video-card");
      if (card) {
        openPlayer(card.dataset.id, card.dataset.title);
      }
    });

    document.getElementById("topicBar").addEventListener("click", e => {
      if (!e.target.dataset.topic) { return; }
      const topic = e.target.dataset.topic;
      setActiveTab(topic);
      if (topic === "trending") {
        loadTrending();
        return;
      }
      mode = "curated";
      activeTopic = topic;
      modeNote.innerText = "";
      render();
    });

    fetch("watch-data.json")
      .then(res => res.json())
      .then(data => {
        allVideos = data.videos || [];
        render();
        document.getElementById("updatedNote").innerText =
          "Auto-updated from channel feeds · Last refresh: " + new Date(data.updatedAt).toLocaleString();
      })
      .catch(() => {
        grid.innerHTML = "<p style='color:var(--muted)'>Could not load videos right now.</p>";
      });
  </script>
</body>
</html>
