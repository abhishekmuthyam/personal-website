<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1b4b, #0f766e);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    header a {
      color: #a5f3fc;
      text-decoration: none;
      font-weight: bold;
    }

    .game {
      width: min(92vw, 560px);
      margin: 10px auto 30px;
      background: white;
      color: #111827;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0;
      font-weight: bold;
    }

    .stat {
      background: #eef2ff;
      border-radius: 10px;
      padding: 10px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 20px auto;
    }

    .card {
      aspect-ratio: 1;
      border: none;
      border-radius: 14px;
      background: #312e81;
      color: white;
      cursor: pointer;
      font-size: clamp(24px, 8vw, 42px);
      font-weight: bold;
      transition: transform 160ms ease, background 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      background: #4338ca;
    }

    .card.flipped,
    .card.matched {
      background: #14b8a6;
      color: #052e2b;
    }

    .card.matched {
      cursor: default;
      opacity: 0.82;
    }

    #message {
      min-height: 24px;
      color: #374151;
      font-weight: bold;
    }

    .reset {
      border: none;
      border-radius: 10px;
      background: #0f766e;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 20px;
    }

    .reset:hover {
      background: #115e59;
    }

    footer {
      padding: 20px;
      color: #ccfbf1;
    }

    @media (max-width: 420px) {
      .game {
        padding: 18px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .board {
        gap: 8px;
      }
    }
  </style>
  <link rel="canonical" href="https://abhishekmuthyam.com/games/memory/">
  <meta property="og:title" content="Memory Game">
  <meta property="og:description" content="Read, play, learn, and watch — an all-in-one hub.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://abhishekmuthyam.com/games/memory/">
  <meta property="og:image" content="https://abhishekmuthyam.com/og-image.png">
  <meta property="og:site_name" content="abhishekmuthyam.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://abhishekmuthyam.com/og-image.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#060913">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <header>
    <a href="../">&larr; Back to Games</a>
  </header>

  <main class="game">
    <h1>Memory Game</h1>
    <p>Find all matching pairs. Try to finish with fewer moves and less time.</p>

    <div class="stats">
      <div class="stat">Moves: <span id="moves">0</span></div>
      <div class="stat">Matches: <span id="matches">0</span>/8</div>
      <div class="stat">Time: <span id="time">0</span>s</div>
    </div>

    <div id="board" class="board" aria-label="Memory card board"></div>
    <p id="message">Flip any card to start.</p>
    <button class="reset" onclick="resetGame()">Reset Game</button>
  </main>

  <footer>
    &copy; 2026 abhishekmuthyam.com
  </footer>

  <script>
    const icons = ["JS", "AI", "DB", "API", "AWS", "Git", "CSS", "Java"];
    const boardElement = document.getElementById("board");
    const movesElement = document.getElementById("moves");
    const matchesElement = document.getElementById("matches");
    const timeElement = document.getElementById("time");
    const messageElement = document.getElementById("message");

    let cards = [];
    let flippedCards = [];
    let matchedCount = 0;
    let moves = 0;
    let seconds = 0;
    let timer;
    let timerStarted = false;
    let boardLocked = false;

    resetGame();

    function resetGame() {
      clearInterval(timer);
      cards = shuffle([...icons, ...icons]).map((value, index) => ({
        id: index,
        value,
        flipped: false,
        matched: false
      }));
      flippedCards = [];
      matchedCount = 0;
      moves = 0;
      seconds = 0;
      timerStarted = false;
      boardLocked = false;
      messageElement.innerText = "Flip any card to start.";
      updateStats();
      renderBoard();
    }

    function renderBoard() {
      boardElement.innerHTML = "";

      cards.forEach(card => {
        const button = document.createElement("button");
        button.className = "card";
        button.type = "button";
        button.setAttribute("aria-label", card.flipped || card.matched ? card.value : "Hidden card");

        if (card.flipped || card.matched) {
          button.classList.add(card.matched ? "matched" : "flipped");
          button.innerText = card.value;
        } else {
          button.innerText = "?";
        }

        button.disabled = card.matched;
        button.addEventListener("click", () => flipCard(card.id));
        boardElement.appendChild(button);
      });
    }

    function flipCard(cardId) {
      const card = cards.find(item => item.id === cardId);

      if (boardLocked || !card || card.flipped || card.matched) {
        return;
      }

      startTimer();
      card.flipped = true;
      flippedCards.push(card);
      renderBoard();

      if (flippedCards.length === 2) {
        moves += 1;
        checkPair();
      }

      updateStats();
    }

    function checkPair() {
      boardLocked = true;
      const firstCard = flippedCards[0];
      const secondCard = flippedCards[1];

      if (firstCard.value === secondCard.value) {
        firstCard.matched = true;
        secondCard.matched = true;
        matchedCount += 1;
        flippedCards = [];
        boardLocked = false;
        messageElement.innerText = "Nice match!";
        renderBoard();

        if (matchedCount === icons.length) {
          finishGame();
        }
        return;
      }

      messageElement.innerText = "Not a match. Try again.";
      setTimeout(() => {
        firstCard.flipped = false;
        secondCard.flipped = false;
        flippedCards = [];
        boardLocked = false;
        renderBoard();
      }, 850);
    }

    function startTimer() {
      if (timerStarted) {
        return;
      }

      timerStarted = true;
      timer = setInterval(() => {
        seconds += 1;
        updateStats();
      }, 1000);
    }

    function finishGame() {
      clearInterval(timer);
      messageElement.innerText = "You matched every pair in " + moves + " moves and " + seconds + " seconds!";
    }

    function updateStats() {
      movesElement.innerText = moves;
      matchesElement.innerText = matchedCount;
      timeElement.innerText = seconds;
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const current = items[i];
        items[i] = items[j];
        items[j] = current;
      }
      return items;
    }
  </script>
</body>
</html>
