<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump Quest - Abhishek Muthyam</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #0c4a6e);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    header a {
      color: #bae6fd;
      text-decoration: none;
      font-weight: bold;
    }

    .game {
      width: min(94vw, 720px);
      margin: 10px auto 30px;
      background: white;
      color: #111827;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 8px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0;
      font-weight: bold;
    }

    canvas {
      width: 100%;
      max-width: 640px;
      height: auto;
      aspect-ratio: 640 / 360;
      background: #87ceeb;
      border-radius: 14px;
      display: block;
      margin: 0 auto;
      box-shadow: inset 0 0 0 4px #0369a1;
    }

    #message {
      min-height: 24px;
      margin: 12px 0;
      color: #374151;
      font-weight: bold;
    }

    .actions,
    .controls {
      display: grid;
      gap: 10px;
      justify-content: center;
    }

    .actions {
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 16px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .controls {
      grid-template-columns: repeat(3, 74px);
      margin-top: 16px;
    }

    .controls button {
      min-height: 48px;
      padding: 8px;
      background: #1f2937;
    }

    .controls button:hover {
      background: #374151;
    }

    .controls .jump {
      grid-column: 2;
    }

    .controls .left {
      grid-column: 1;
    }

    .controls .right {
      grid-column: 3;
    }

    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 6px;
    }

    footer {
      padding: 20px;
      color: #dbeafe;
    }
  </style>
</head>
<body>
  <header>
    <a href="../">&larr; Back to Games</a>
  </header>

  <main class="game">
    <h1>Jump Quest</h1>
    <p>Run, jump over gaps, dodge the enemy, collect coins, and reach the flag.</p>

    <div class="score-row">
      <span>Coins: <span id="coins">0</span></span>
      <span>Best: <span id="bestCoins">0</span></span>
      <span>Lives: <span id="lives">3</span></span>
    </div>

    <canvas id="board" width="640" height="360" aria-label="Jump Quest game board"></canvas>
    <p id="message">Press Start to play.</p>
    <p class="hint">Arrow keys / A-D to move, Space or Up to jump.</p>

    <div class="actions">
      <button onclick="startGame()">Start Game</button>
      <button onclick="resetGame()">Reset</button>
      <button id="muteBtn" onclick="toggleMusic()">🔊 Music</button>
    </div>

    <div class="controls" aria-label="Mobile controls">
      <button class="jump" onclick="pressJump()">Jump</button>
      <button class="left" onmousedown="setMove(-1)" onmouseup="setMove(0)" ontouchstart="setMove(-1)" ontouchend="setMove(0)">Left</button>
      <button class="right" onmousedown="setMove(1)" onmouseup="setMove(0)" ontouchstart="setMove(1)" ontouchend="setMove(0)">Right</button>
    </div>
  </main>

  <footer>
    &copy; 2026 Abhishek Muthyam
  </footer>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const coinsElement = document.getElementById("coins");
    const bestCoinsElement = document.getElementById("bestCoins");
    const livesElement = document.getElementById("lives");
    const messageElement = document.getElementById("message");

    const GRAVITY = 0.6;
    const JUMP_FORCE = -11.5;
    const MOVE_SPEED = 3.2;
    const GROUND_Y = 300;
    const WORLD_WIDTH = 2200;

    let bestCoins = Number(localStorage.getItem("jumpQuestBestCoins")) || 0;
    bestCoinsElement.innerText = bestCoins;

    let audioCtx;
    let musicEnabled = localStorage.getItem("jumpQuestMusic") !== "off";
    let musicTimer;
    let musicStep = 0;
    const muteBtn = document.getElementById("muteBtn");
    muteBtn.innerText = musicEnabled ? "🔊 Music" : "🔇 Music";
    const melody = [261.63, 293.66, 329.63, 261.63, 329.63, 392.0, 329.63, 293.66];

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function beep(freq, duration, type, volume, delay) {
      if (!audioCtx) {
        return;
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || "square";
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const startTime = audioCtx.currentTime + (delay || 0);
      const vol = volume || 0.15;
      gain.gain.setValueAtTime(vol, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    function playJumpSound() {
      beep(600, 0.12, "square", 0.12);
      beep(900, 0.08, "square", 0.1, 0.05);
    }

    function playCoinSound() {
      beep(988, 0.08, "square", 0.15);
      beep(1319, 0.12, "square", 0.15, 0.08);
    }

    function playStompSound() {
      beep(150, 0.15, "sawtooth", 0.2);
    }

    function playHurtSound() {
      beep(120, 0.3, "sawtooth", 0.2);
    }

    function playWinSound() {
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => beep(f, 0.18, "square", 0.15, i * 0.15));
    }

    function playGameOverSound() {
      [400, 350, 300, 250].forEach((f, i) => beep(f, 0.25, "sawtooth", 0.15, i * 0.2));
    }

    function startMusic() {
      stopMusic();
      if (!musicEnabled || !audioCtx) {
        return;
      }
      musicStep = 0;
      musicTimer = setInterval(() => {
        beep(melody[musicStep % melody.length], 0.18, "triangle", 0.05);
        musicStep++;
      }, 220);
    }

    function stopMusic() {
      clearInterval(musicTimer);
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      localStorage.setItem("jumpQuestMusic", musicEnabled ? "on" : "off");
      muteBtn.innerText = musicEnabled ? "🔊 Music" : "🔇 Music";
      if (musicEnabled) {
        ensureAudio();
        if (running) {
          startMusic();
        }
      } else {
        stopMusic();
      }
    }

    let player;
    let platforms;
    let coins;
    let enemies;
    let flag;
    let camera;
    let moveDir = 0;
    let jumpQueued = false;
    let coinCount = 0;
    let lives = 3;
    let running = false;
    let won = false;
    let rafId;

    function buildLevel() {
      platforms = [
        { x: 0, y: GROUND_Y, w: 500, h: 60 },
        { x: 600, y: GROUND_Y, w: 300, h: 60 },
        { x: 1000, y: GROUND_Y, w: 200, h: 60 },
        { x: 1300, y: GROUND_Y, w: 500, h: 60 },
        { x: 1900, y: GROUND_Y, w: 300, h: 60 },
        { x: 780, y: 220, w: 100, h: 20 },
        { x: 1080, y: 200, w: 100, h: 20 },
        { x: 1500, y: 230, w: 120, h: 20 },
        { x: 1700, y: 170, w: 100, h: 20 }
      ];

      coins = [
        { x: 260, y: 260, taken: false },
        { x: 650, y: 260, taken: false },
        { x: 820, y: 180, taken: false },
        { x: 1120, y: 160, taken: false },
        { x: 1350, y: 260, taken: false },
        { x: 1550, y: 190, taken: false },
        { x: 1750, y: 130, taken: false },
        { x: 1950, y: 260, taken: false }
      ];

      enemies = [
        { x: 650, y: GROUND_Y - 24, w: 26, h: 24, minX: 610, maxX: 870, dir: 1, speed: 1.3 },
        { x: 1350, y: GROUND_Y - 24, w: 26, h: 24, minX: 1310, maxX: 1600, dir: 1, speed: 1.5 },
        { x: 1950, y: GROUND_Y - 24, w: 26, h: 24, minX: 1910, maxX: 2150, dir: -1, speed: 1.4 }
      ];

      flag = { x: 2120, y: 180, w: 20, h: 120 };
    }

    function resetPlayer() {
      player = { x: 40, y: GROUND_Y - 40, w: 28, h: 40, vx: 0, vy: 0, onGround: false };
      camera = { x: 0 };
    }

    function resetGame() {
      cancelAnimationFrame(rafId);
      buildLevel();
      resetPlayer();
      coinCount = 0;
      lives = 3;
      running = false;
      won = false;
      moveDir = 0;
      updateHud();
      messageElement.innerText = "Press Start to play.";
      draw();
    }

    function startGame() {
      if (running) {
        return;
      }
      if (won || lives <= 0) {
        buildLevel();
        resetPlayer();
        coinCount = 0;
        lives = 3;
        won = false;
        updateHud();
      }
      running = true;
      messageElement.innerText = "Go!";
      ensureAudio();
      startMusic();
      rafId = requestAnimationFrame(loop);
    }

    function pressJump() {
      jumpQueued = true;
      startGame();
    }

    function setMove(dir) {
      moveDir = dir;
    }

    function updateHud() {
      coinsElement.innerText = coinCount;
      livesElement.innerText = lives;
      bestCoinsElement.innerText = bestCoins;
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function loop() {
      update();
      draw();
      if (running) {
        rafId = requestAnimationFrame(loop);
      }
    }

    function update() {
      player.vx = moveDir * MOVE_SPEED;

      if (jumpQueued && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
        playJumpSound();
      }
      jumpQueued = false;

      player.vy += GRAVITY;
      player.x += player.vx;
      player.y += player.vy;

      player.onGround = false;
      const feet = { x: player.x, y: player.y, w: player.w, h: player.h };
      platforms.forEach(p => {
        const wasAbove = feet.y + feet.h - player.vy <= p.y;
        if (
          rectsOverlap(feet, p) &&
          player.vy >= 0 &&
          wasAbove
        ) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      });

      if (player.x < 0) {
        player.x = 0;
      }

      if (player.y > canvas.height + 100) {
        loseLife();
        return;
      }

      coins.forEach(c => {
        if (!c.taken && rectsOverlap(player, { x: c.x - 10, y: c.y - 10, w: 20, h: 20 })) {
          c.taken = true;
          coinCount += 10;
          if (coinCount > bestCoins) {
            bestCoins = coinCount;
            localStorage.setItem("jumpQuestBestCoins", String(bestCoins));
          }
          playCoinSound();
          updateHud();
        }
      });

      enemies.forEach(e => {
        e.x += e.dir * e.speed;
        if (e.x < e.minX || e.x > e.maxX) {
          e.dir *= -1;
        }
        if (rectsOverlap(player, e)) {
          if (player.vy > 0 && player.y + player.h - player.vy <= e.y) {
            e.x = e.minX - 9999;
            player.vy = JUMP_FORCE / 2;
            playStompSound();
          } else {
            loseLife();
          }
        }
      });

      if (rectsOverlap(player, flag)) {
        winGame();
      }

      camera.x = Math.max(0, Math.min(player.x - canvas.width / 2, WORLD_WIDTH - canvas.width));
    }

    function loseLife() {
      lives -= 1;
      updateHud();
      if (lives <= 0) {
        running = false;
        stopMusic();
        playGameOverSound();
        cancelAnimationFrame(rafId);
        messageElement.innerText = "Game over! Press Start to try again.";
        return;
      }
      playHurtSound();
      resetPlayer();
      messageElement.innerText = "Ouch! Lives left: " + lives;
    }

    function winGame() {
      running = false;
      won = true;
      stopMusic();
      playWinSound();
      cancelAnimationFrame(rafId);
      messageElement.innerText = "You reached the flag! Coins: " + coinCount;
    }

    function draw() {
      ctx.save();
      ctx.fillStyle = "#87ceeb";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.translate(-camera.x, 0);

      ctx.fillStyle = "#166534";
      platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
      });

      ctx.fillStyle = "#fbbf24";
      coins.forEach(c => {
        if (!c.taken) {
          ctx.beginPath();
          ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      ctx.fillStyle = "#7f1d1d";
      enemies.forEach(e => {
        if (e.x > -1000) {
          ctx.fillRect(e.x, e.y, e.w, e.h);
        }
      });

      ctx.fillStyle = "#166534";
      ctx.fillRect(flag.x, flag.y, 6, flag.h);
      ctx.fillStyle = "#dc2626";
      ctx.beginPath();
      ctx.moveTo(flag.x + 6, flag.y);
      ctx.lineTo(flag.x + 34, flag.y + 12);
      ctx.lineTo(flag.x + 6, flag.y + 24);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#1d4ed8";
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = "#fde68a";
      ctx.fillRect(player.x + 6, player.y + 6, player.w - 12, 10);

      ctx.restore();
    }

    document.addEventListener("keydown", event => {
      if (["ArrowLeft", "a", "A"].includes(event.key)) {
        moveDir = -1;
      } else if (["ArrowRight", "d", "D"].includes(event.key)) {
        moveDir = 1;
      } else if ([" ", "ArrowUp", "w", "W"].includes(event.key)) {
        event.preventDefault();
        jumpQueued = true;
        startGame();
      }
    });

    document.addEventListener("keyup", event => {
      if (["ArrowLeft", "a", "A", "ArrowRight", "d", "D"].includes(event.key)) {
        moveDir = 0;
      }
    });

    resetGame();
  </script>
</body>
</html>
