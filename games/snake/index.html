<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Abhishek Muthyam</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #14532d);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    header a {
      color: #bbf7d0;
      text-decoration: none;
      font-weight: bold;
    }

    .game {
      width: min(92vw, 460px);
      margin: 10px auto 30px;
      background: white;
      color: #111827;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0;
      font-weight: bold;
    }

    canvas {
      width: min(100%, 400px);
      aspect-ratio: 1;
      background: #111827;
      border-radius: 14px;
      display: block;
      margin: 0 auto;
      box-shadow: inset 0 0 0 4px #1f2937;
    }

    #message {
      min-height: 24px;
      margin: 14px 0;
      color: #374151;
      font-weight: bold;
    }

    .actions,
    .controls {
      display: grid;
      gap: 10px;
      justify-content: center;
    }

    .actions {
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      background: #16a34a;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 16px;
    }

    button:hover {
      background: #15803d;
    }

    .controls {
      grid-template-columns: repeat(3, 58px);
      margin-top: 18px;
    }

    .controls button {
      min-height: 48px;
      padding: 8px;
      background: #1f2937;
    }

    .controls button:hover {
      background: #374151;
    }

    .controls .up {
      grid-column: 2;
    }

    .controls .left {
      grid-column: 1;
    }

    .controls .right {
      grid-column: 3;
    }

    .controls .down {
      grid-column: 2;
    }

    footer {
      padding: 20px;
      color: #d1fae5;
    }
  </style>
</head>
<body>
  <header>
    <a href="../">&larr; Back to Games</a>
  </header>

  <main class="game">
    <h1>Snake Game</h1>
    <p>Use arrow keys or the buttons below. Eat food, grow longer, and avoid walls.</p>

    <div class="score-row">
      <span>Score: <span id="score">0</span></span>
      <span>Best: <span id="bestScore">0</span></span>
    </div>

    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <p id="message">Press Start Game to play.</p>

    <div class="actions">
      <button onclick="startGame()">Start Game</button>
      <button onclick="resetGame()">Reset</button>
    </div>

    <div class="controls" aria-label="Mobile controls">
      <button class="up" onclick="changeDirection('up')">Up</button>
      <button class="left" onclick="changeDirection('left')">Left</button>
      <button class="right" onclick="changeDirection('right')">Right</button>
      <button class="down" onclick="changeDirection('down')">Down</button>
    </div>
  </main>

  <footer>
    &copy; 2026 Abhishek Muthyam
  </footer>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const bestScoreElement = document.getElementById("bestScore");
    const messageElement = document.getElementById("message");
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let bestScore = Number(localStorage.getItem("snakeBestScore")) || 0;
    let gameTimer;
    let gameRunning = false;

    bestScoreElement.innerText = bestScore;
    resetGame();

    function resetGame() {
      clearInterval(gameTimer);
      snake = [{ x: 10, y: 10 }];
      direction = { x: 0, y: 0 };
      nextDirection = { x: 0, y: 0 };
      score = 0;
      gameRunning = false;
      placeFood();
      updateScore();
      messageElement.innerText = "Press Start Game to play.";
      draw();
    }

    function startGame() {
      if (gameRunning) {
        return;
      }

      if (direction.x === 0 && direction.y === 0) {
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
      }

      gameRunning = true;
      messageElement.innerText = "Game running!";
      clearInterval(gameTimer);
      gameTimer = setInterval(updateGame, 120);
    }

    function updateGame() {
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (hitWall(head) || hitSnake(head)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = "#111827";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#86efac" : "#22c55e";
        ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
      });

      ctx.fillStyle = "#f97316";
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function changeDirection(move) {
      const moves = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };
      const newDirection = moves[move];

      if (!newDirection) {
        return;
      }

      if (snake.length > 1 && newDirection.x === -direction.x && newDirection.y === -direction.y) {
        return;
      }

      nextDirection = newDirection;
    }

    function hitWall(head) {
      return head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
    }

    function hitSnake(head) {
      return snake.some(part => part.x === head.x && part.y === head.y);
    }

    function endGame() {
      clearInterval(gameTimer);
      gameRunning = false;
      messageElement.innerText = "Game over! Press Reset to try again.";

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("snakeBestScore", String(bestScore));
        bestScoreElement.innerText = bestScore;
      }
    }

    function updateScore() {
      scoreElement.innerText = score;
      bestScoreElement.innerText = bestScore;
    }

    document.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: "up",
        ArrowDown: "down",
        ArrowLeft: "left",
        ArrowRight: "right"
      };

      if (keyMap[event.key]) {
        event.preventDefault();
        changeDirection(keyMap[event.key]);
        startGame();
      }
    });
  </script>
</body>
</html>
