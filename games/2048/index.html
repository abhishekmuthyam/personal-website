<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048</title>
  <meta name="description" content="Join the numbers to reach the 2048 tile">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #0b0b0f; color: #f8fafc; min-height: 100vh; text-align: center; }
    header { padding: 18px 20px; display: flex; justify-content: space-between; max-width: 900px; margin: 0 auto; }
    header a { color: #a5b4fc; text-decoration: none; font-weight: 600; font-size: 14px; }
    h1 { font-size: 26px; margin: 4px 0 6px; }
    .tag { color: #94a3b8; font-size: 14px; margin: 0 0 18px; }
    .game-shell { max-width: 520px; margin: 0 auto 30px; padding: 0 14px; }
    .panel { background: #15151d; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 20px; box-shadow: 0 24px 60px rgba(0,0,0,0.55); }
    .hud { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 14px; font-weight: 700; font-size: 14px; color: #94a3b8; }
    .hud b { color: #fff; font-size: 18px; display: block; }
    button { border: none; border-radius: 10px; background: #0d9488; color: white; cursor: pointer; font-weight: 700; font-family: inherit; padding: 12px 20px; font-size: 15px; }
    button:active { transform: scale(0.97); }
    #msg { min-height: 22px; font-weight: 700; margin: 12px 0 4px; }
    .lb { max-width: 520px; margin: 0 auto 40px; padding: 0 14px; text-align: left; }
    .lb h2 { font-size: 16px; text-align: center; }
    .lb ol { list-style: none; padding: 0; margin: 0; }
    .lb li { display: flex; justify-content: space-between; padding: 7px 4px; border-bottom: 1px solid rgba(255,255,255,0.07); color: #cbd5e1; font-size: 14px; }
    .lb li span:last-child { font-weight: 700; color: #fff; }
    .lb-note { color: #64748b; font-size: 12px; text-align: center; margin-top: 8px; }
    .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; background: #0b0b0f; border-radius: 12px; padding: 9px; touch-action: none; }
    .cell { aspect-ratio: 1; border-radius: 9px; background: #1e1e29; display: flex; align-items: center; justify-content: center; font-family: 'Inter'; font-weight: 800; font-size: clamp(18px, 6vw, 30px); transition: transform 0.08s; }
    .v2 { background:#2d2d3f; } .v4 { background:#3b3b57; } .v8 { background:#4f46e5; } .v16 { background:#6d28d9; }
    .v32 { background:#be185d; } .v64 { background:#dc2626; } .v128 { background:#ea580c; font-size: clamp(16px,5vw,26px); }
    .v256 { background:#d97706; font-size: clamp(16px,5vw,26px); } .v512 { background:#ca8a04; font-size: clamp(16px,5vw,26px); }
    .v1024 { background:#65a30d; font-size: clamp(14px,4.4vw,22px); } .v2048 { background:#0d9488; font-size: clamp(14px,4.4vw,22px); box-shadow: 0 0 24px rgba(13,148,136,0.8); }
  </style>
  <link rel="canonical" href="https://abhishekmuthyam.com/games/2048/">
  <meta property="og:title" content="2048">
  <meta property="og:description" content="Join the numbers to reach the 2048 tile">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://abhishekmuthyam.com/games/2048/">
  <meta property="og:image" content="https://abhishekmuthyam.com/og-image.png">
  <meta property="og:site_name" content="abhishekmuthyam.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://abhishekmuthyam.com/og-image.png">
</head>
<body>
<header>
  <a href="/games">&larr; Games</a>
  <a href="/">Home</a>
</header>
<div class="game-shell">
  <h1>2048</h1>
  <p class="tag">Join the numbers to reach the 2048 tile</p>
  <div class="panel">
    <div class="hud"><span>Score<b id="score">0</b></span><span>Best<b id="best">0</b></span></div>
    <div class="board" id="board"></div>
    <p id="msg"></p>
    <button onclick="reset()">New Game</button>
  </div>
  <p class="tag" style="margin-top:12px;">Swipe or use arrow keys. Join tiles to reach 2048!</p>

</div>
<div class="lb">
  <h2>🌍 Global Top 10</h2>
  <ol id="lbList"><li><span>Loading...</span><span></span></li></ol>
  <p class="lb-note" id="lbNote"></p>
</div>
<script>
const LEADERBOARD_URL = "https://zsxujdnvqodtnhxwxbvbucsp7q0gqpbg.lambda-url.ap-south-1.on.aws/";
const GAME_ID = "2048";
async function loadLeaderboard() {
  const list = document.getElementById("lbList");
  try {
    const res = await fetch(LEADERBOARD_URL + "?game=" + GAME_ID);
    const data = await res.json();
    if (!data.top || !data.top.length) { list.innerHTML = "<li><span>No scores yet — be the first!</span><span></span></li>"; return; }
    list.innerHTML = data.top.map((e, i) => {
      const n = e.name.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
      return "<li><span>" + (i+1) + ". " + n + "</span><span>" + e.score + "</span></li>";
    }).join("");
  } catch { list.innerHTML = "<li><span>Leaderboard unavailable</span><span></span></li>"; }
}
async function submitScore(score) {
  if (score <= 0) return;
  let playerName = localStorage.getItem("playerName");
  if (!playerName) {
    playerName = (prompt("Enter your name for the global leaderboard:") || "").trim().slice(0, 20);
    if (!playerName) return;
    localStorage.setItem("playerName", playerName);
  }
  try {
    await fetch(LEADERBOARD_URL, { method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ game: GAME_ID, name: playerName, score }) });
    document.getElementById("lbNote").innerText = "Score submitted as " + playerName + "!";
    loadLeaderboard();
  } catch { document.getElementById("lbNote").innerText = "Could not submit score"; }
}
loadLeaderboard();

let grid, score, over, won;
const boardEl = document.getElementById("board");
let best = Number(localStorage.getItem("best2048")) || 0;
document.getElementById("best").innerText = best;

function reset() {
  grid = Array.from({length:4}, () => [0,0,0,0]);
  score = 0; over = false; won = false;
  document.getElementById("msg").innerText = "";
  add(); add(); draw();
}
function add() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}
function draw() {
  boardEl.innerHTML = "";
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    const d = document.createElement("div");
    const v = grid[r][c];
    d.className = "cell" + (v ? " v" + v : "");
    d.textContent = v || "";
    boardEl.appendChild(d);
  }
  document.getElementById("score").innerText = score;
  if (score > best) { best = score; localStorage.setItem("best2048", best); document.getElementById("best").innerText = best; }
}
function slide(row) {
  const a = row.filter(v => v);
  for (let i=0;i<a.length-1;i++) {
    if (a[i] === a[i+1]) { a[i] *= 2; score += a[i]; if (a[i] === 2048) won = true; a.splice(i+1,1); }
  }
  while (a.length < 4) a.push(0);
  return a;
}
function move(dir) {
  if (over) return;
  const before = JSON.stringify(grid);
  for (let i=0;i<4;i++) {
    let line;
    if (dir === "left") { grid[i] = slide(grid[i]); }
    else if (dir === "right") { grid[i] = slide(grid[i].slice().reverse()).reverse(); }
    else {
      line = [grid[0][i],grid[1][i],grid[2][i],grid[3][i]];
      line = dir === "up" ? slide(line) : slide(line.slice().reverse()).reverse();
      for (let r=0;r<4;r++) grid[r][i] = line[r];
    }
  }
  if (JSON.stringify(grid) !== before) { add(); draw(); check(); }
}
function check() {
  if (won) { document.getElementById("msg").innerText = "🎉 You made 2048! Keep going!"; won = false; }
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    if (!grid[r][c]) return;
    if (c<3 && grid[r][c]===grid[r][c+1]) return;
    if (r<3 && grid[r][c]===grid[r+1][c]) return;
  }
  over = true;
  document.getElementById("msg").innerText = "Game over! Score: " + score;
  submitScore(score);
}
document.addEventListener("keydown", e => {
  const m = {ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down"}[e.key];
  if (m) { e.preventDefault(); move(m); }
});
let tx, ty;
boardEl.addEventListener("touchstart", e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
boardEl.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) return;
  move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up"));
});
reset();

</script>
</body>
</html>
