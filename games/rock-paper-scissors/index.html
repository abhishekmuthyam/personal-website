<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    header a {
      color: #93c5fd;
      text-decoration: none;
    }

    .game {
      margin: 30px auto;
      max-width: 400px;
      background: white;
      color: #111827;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .choice {
      font-size: 36px;
      width: 70px;
      height: 70px;
      border: none;
      border-radius: 12px;
      background: #e5e7eb;
      cursor: pointer;
    }

    .choice:hover {
      background: #d1d5db;
    }

    .result {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      font-size: 40px;
    }

    #status {
      font-size: 20px;
      font-weight: bold;
      min-height: 28px;
    }

    #score {
      font-size: 16px;
      color: #4b5563;
      margin-top: 10px;
    }

    .reset {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .reset:hover {
      background: #1d4ed8;
    }

    footer {
      padding: 20px;
      color: #d1d5db;
    }
  </style>
  <link rel="canonical" href="https://abhishekmuthyam.com/games/rock-paper-scissors/">
  <meta property="og:title" content="Rock Paper Scissors">
  <meta property="og:description" content="Read, play, learn, and watch — an all-in-one hub.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://abhishekmuthyam.com/games/rock-paper-scissors/">
  <meta property="og:image" content="https://abhishekmuthyam.com/og-image.png">
  <meta property="og:site_name" content="abhishekmuthyam.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://abhishekmuthyam.com/og-image.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#060913">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>

<body>

<header>
  <a href="../">← Back to Games</a>
</header>

<div class="game">
  <h1>Rock Paper Scissors</h1>
  <p id="status">Make your move</p>

  <div class="result">
    <span id="playerPick">❔</span>
    <span>vs</span>
    <span id="computerPick">❔</span>
  </div>

  <div class="choices">
    <button class="choice" onclick="play('rock')">🪨</button>
    <button class="choice" onclick="play('paper')">📄</button>
    <button class="choice" onclick="play('scissors')">✂️</button>
  </div>

  <p id="score">Wins: 0 · Losses: 0 · Ties: 0</p>

  <button class="reset" onclick="resetGame()">Reset Score</button>
</div>

<footer>
  © 2026 abhishekmuthyam.com
</footer>

<script>
  const emojis = { rock: "🪨", paper: "📄", scissors: "✂️" };
  let wins = 0, losses = 0, ties = 0;

  function play(playerChoice) {
    const options = ["rock", "paper", "scissors"];
    const computerChoice = options[Math.floor(Math.random() * options.length)];

    document.getElementById("playerPick").innerText = emojis[playerChoice];
    document.getElementById("computerPick").innerText = emojis[computerChoice];

    let outcome;
    if (playerChoice === computerChoice) {
      outcome = "It's a tie!";
      ties++;
    } else if (
      (playerChoice === "rock" && computerChoice === "scissors") ||
      (playerChoice === "paper" && computerChoice === "rock") ||
      (playerChoice === "scissors" && computerChoice === "paper")
    ) {
      outcome = "You win!";
      wins++;
    } else {
      outcome = "You lose!";
      losses++;
    }

    document.getElementById("status").innerText = outcome;
    updateScore();
  }

  function updateScore() {
    document.getElementById("score").innerText =
      "Wins: " + wins + " · Losses: " + losses + " · Ties: " + ties;
  }

  function resetGame() {
    wins = 0;
    losses = 0;
    ties = 0;
    document.getElementById("playerPick").innerText = "❔";
    document.getElementById("computerPick").innerText = "❔";
    document.getElementById("status").innerText = "Make your move";
    updateScore();
  }
</script>

</body>
</html>
