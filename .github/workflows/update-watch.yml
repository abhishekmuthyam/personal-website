name: Update watch feed

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest videos
        run: node scripts/fetch-watch.js

      - name: Commit updated watch data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add watch/watch-data.json
          if git diff --cached --quiet; then
            echo "No watch changes to commit."
          else
            git commit -m "Update watch feed"
            git push
          fi
