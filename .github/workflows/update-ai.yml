name: Update AI feed

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest AI updates
        run: node scripts/fetch-ai.js

      - name: Commit updated AI data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add learn/ai-updates.json
          if git diff --cached --quiet; then
            echo "No AI feed changes to commit."
          else
            git commit -m "Update AI feed"
            git push
          fi
