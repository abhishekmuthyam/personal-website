name: Update tech news

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest technical news
        run: node scripts/fetch-news.js

      - name: Commit updated news data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/news-data.json
          if git diff --cached --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "Update tech news feed"
            git push
          fi
